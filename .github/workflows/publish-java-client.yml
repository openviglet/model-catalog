name: Publish Java client

# Manually publishes the no-runtime-dep Java client to Maven Central via the Central
# Portal (https://central.sonatype.com), coordinate
# io.github.openviglet:model-catalog-client. Follows the Viglet Turing publish
# pattern. Every run auto-increments the patch in clients/java/pom.xml, commits + tags
# the bump, runs `mvn verify` as a gate, then `mvn -P release deploy` (signs
# sources+javadoc+jar with GPG and publishes). The version is derived, never typed;
# Central rejects a re-published release anyway.
#
# ── Required repo secrets (same names as Turing) ──────────────────────────────
#   OSSRH_USERNAME / OSSRH_TOKEN — Central Portal user token (central.sonatype.com →
#       Account → Generate User Token). The io.github.openviglet namespace is
#       auto-verified for the openviglet GitHub org.
#   GPG_PRIVATE_KEY — ASCII-armored GPG private key (public key on a keyserver;
#       Central requires signed artifacts).
#   GPG_PASSPHRASE — that key's passphrase.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-java-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" > private.key
          gpg --batch --import private.key
          gpg --list-secret-keys
          echo "GPG_TTY=$(tty)" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/java
        run: |
          set -euo pipefail
          CUR=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          IFS=. read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          mvn -B -q versions:set -DnewVersion="$NEW" -DgenerateBackupPoms=false
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped Java client to $NEW"

      - name: Build + test (publish gate)
        working-directory: clients/java
        run: mvn -B verify

      # Record the bump before publishing: a burned version number (if publish
      # later fails) is harmless; re-using one already on Central is a hard failure.
      - name: Commit + tag version bump
        run: |
          set -euo pipefail
          git add clients/java/pom.xml
          git commit -m "chore(release): java client v${NEW_VERSION} [skip ci]"
          git tag "java-v${NEW_VERSION}"
          git push --follow-tags

      - name: Configure Maven settings (central server credentials)
        uses: s4u/maven-settings-action@894661b3ddae382f1ae8edbeab60987e08cf0788 # v4.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.OSSRH_USERNAME }}",
              "password": "${{ secrets.OSSRH_TOKEN }}"
            }]

      - name: Publish to Maven Central
        working-directory: clients/java
        run: mvn -B -P release -DskipTests deploy
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
