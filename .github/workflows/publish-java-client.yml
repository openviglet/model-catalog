name: Publish Java client

# Manually publishes the no-runtime-dep Java client to Maven Central via the Central
# Portal (https://central.sonatype.com), coordinate
# io.github.openviglet:models-catalog-client. Every run auto-increments the patch in
# clients/java/pom.xml, commits + tags the bump, runs `mvn verify` as a gate, then
# `mvn -P release deploy` (signs sources+javadoc+jar with GPG and publishes). The
# version is derived, never typed; Central rejects a re-published release anyway.
#
# ── Required repo secrets ─────────────────────────────────────────────────────
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD — a Central Portal user token
#       (central.sonatype.com → Account → Generate User Token). The io.github.openviglet
#       namespace is auto-verified for the openviglet GitHub org.
#   MAVEN_GPG_PRIVATE_KEY — an ASCII-armored GPG private key whose public key is on a
#       public keyserver (Central requires signed artifacts).
#   MAVEN_GPG_PASSPHRASE — that key's passphrase.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-java-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          # Writes ~/.m2/settings.xml with a `central` server whose credentials are
          # read from these env vars at deploy time, and imports the signing key.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/java
        run: |
          set -euo pipefail
          CUR=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          IFS=. read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          mvn -B -q versions:set -DnewVersion="$NEW" -DgenerateBackupPoms=false
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped Java client to $NEW"

      - name: Build + test (publish gate)
        working-directory: clients/java
        run: mvn -B verify

      # Record the bump before publishing: a burned version number (if publish
      # later fails) is harmless; re-using one already on Central is a hard failure.
      - name: Commit + tag version bump
        run: |
          set -euo pipefail
          git add clients/java/pom.xml
          git commit -m "chore(release): java client v${NEW_VERSION} [skip ci]"
          git tag "java-v${NEW_VERSION}"
          git push --follow-tags

      - name: Publish to Maven Central
        working-directory: clients/java
        run: mvn -B -P release -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
