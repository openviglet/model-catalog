name: Publish Python client

# Manually publishes the stdlib-only Python client to PyPI
# (https://pypi.org/project/openviglet-models-catalog-client/). Every run
# auto-increments the patch in clients/python/pyproject.toml, commits + tags the
# bump, builds an sdist + wheel, then uploads them with twine. The version is
# derived, never typed; PyPI rejects a re-uploaded version anyway.
#
# ── Required repo secret ──────────────────────────────────────────────────────
#   PYPI_API_TOKEN — a PyPI API token scoped to this project (pypi.org → Account
#   settings → API tokens). Used as the password with the __token__ username.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-python-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/python
        run: |
          set -euo pipefail
          CUR=$(grep -m1 -oP '(?<=^version = ")[0-9]+\.[0-9]+\.[0-9]+' pyproject.toml)
          IFS=. read -r MA MI PA <<< "$CUR"
          NEW="$MA.$MI.$((PA + 1))"
          sed -i -E "s/^version = \"$CUR\"/version = \"$NEW\"/" pyproject.toml
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped Python client to $NEW"

      # Client runtime is stdlib-only; build/twine are CI-only tools, never deps.
      - name: Test (publish gate)
        working-directory: clients/python
        run: python -m unittest discover -s tests

      - name: Build sdist + wheel
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build

      # Record the bump before publishing: a burned version number (if publish
      # later fails) is harmless; re-using one already on PyPI is a hard failure.
      - name: Commit + tag version bump
        run: |
          set -euo pipefail
          git add clients/python/pyproject.toml
          git commit -m "chore(release): python client v${NEW_VERSION} [skip ci]"
          git tag "py-v${NEW_VERSION}"
          git push --follow-tags

      - name: Publish to PyPI
        working-directory: clients/python
        run: |
          python -m pip install --upgrade twine
          python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
