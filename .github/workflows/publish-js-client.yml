name: Publish JS client

# Manually publishes the zero-dependency JS/TS client to npm
# (https://www.npmjs.com/package/@openviglet/model-catalog-client). Every run
# auto-increments the patch in clients/js/package.json, commits + tags the bump,
# then runs `npm publish`. The version is derived, never typed, so it can never
# drift from package.json, and npm rejects a re-published version anyway.
#
# ── Required repo secret ──────────────────────────────────────────────────────
#   NPM_TOKEN — an npm automation token with publish rights on the @openviglet
#   scope (npmjs.com → Access Tokens → Generate → Automation).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-js-client
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          scope: "@openviglet"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump the patch in the working tree; commit only after the gate passes below.
      - name: Bump patch version
        working-directory: clients/js
        run: |
          set -euo pipefail
          NEW=$(npm version patch --no-git-tag-version | tr -d 'v')
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"
          echo "Bumped JS client to $NEW"

      # Zero-dependency: no `npm ci` — tests need nothing installed.
      - name: Test (publish gate)
        working-directory: clients/js
        run: node --test

      # Record the bump before publishing: a burned version number (if publish
      # later fails) is harmless; re-using one already on npm is a hard failure.
      - name: Commit + tag version bump
        run: |
          set -euo pipefail
          git add clients/js/package.json
          git commit -m "chore(release): js client v${NEW_VERSION} [skip ci]"
          git tag "js-v${NEW_VERSION}"
          git push --follow-tags

      - name: Publish to npm
        working-directory: clients/js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
